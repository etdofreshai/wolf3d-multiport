<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolfenstein 3-D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
    }
    #loading {
      color: #fff;
      font-family: monospace;
      font-size: 24px;
      position: absolute;
    }
  </style>
</head>
<body>
  <div id="loading">Loading Wolfenstein 3-D...</div>
  <canvas id="wolf3d-canvas" width="320" height="200"></canvas>
  <script type="module" src="/src/typescript-port/main.ts"></script>
</body>
</html>
